spring.application.name=gateway

server.port=8010

#Url of discovery server
eureka.client.serviceUrl.defaultZone=http://discovery:8010/eureka

#Enables automatic mapping to microservices instances
spring.cloud.gateway.discovery.locator.enabled=true

#Allows the http request's url to be sent with service's name in lower case
spring.cloud.gateway.discovery.locator.lower-case-service-id=true


eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false