name: Sonar Gateway

on:
  workflow_run:
    workflows: ["Build Gateway"]
    types: [completed]
  workflow_dispatch:

jobs:
  sonar:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: hendafarhani/microGo/.github/workflows/sonar-analysis.yml@main
    with:
      java_version: "21"
      sonar_project_key: "hendafarhani_gateway"
      sonar_organization: "hendafarhani"
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
